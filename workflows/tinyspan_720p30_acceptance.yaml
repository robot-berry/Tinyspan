  - manifest.json
  - run_summary.md
  - checkpoint.sha256
  - quant_plan.sha256
  - input.sha256
  - software_reference.sha256
  - board_output.sha256
  - resource_gate.json
  - utilization.rpt
  - timing.rpt
  - board.log
  - throughput.json
  - training_sr.png
  - software_fixed_point_sr.png
  - board_sr.png
  - diff_heatmap.png
  - comparison_preview.png
  - image_validation.json
  - image_validation.md
  - model_design.md
  - training_quantization.md
  - hardware_design.md
  - model_to_hardware_tool.md
  - vivado_simulation.md
  - ppa_summary.json
  - ppa_summary.md

image_validation:
  description_zh: 对比 TinySPAN 训练/浮点超分输出、软件定点参考输出和真实板上输出，生成可查看图片与量化指标。
  required_images:
    training_sr: training_sr.png
    software_fixed_point_sr: software_fixed_point_sr.png
    board_sr: board_sr.png
    diff_heatmap: diff_heatmap.png
    comparison_preview: comparison_preview.png
  required_reports:
    json: image_validation.json
    markdown: image_validation.md
  hard_gate_zh:
    - board_sr 对应的原始 RGB 数据必须与 software_fixed_point_sr 逐字节一致。
    - comparison_preview.png 必须可直接打开查看。
    - diff_heatmap.png 必须可直接打开查看。
  visual_metric_defaults:
    compare_pair: board_sr_vs_training_sr
    psnr_db_min: 45.0
    ssim_min: 0.99
    mae_rgb_level_max: 1.0
    max_channel_diff_max: 4

workflow:
  - id: freeze_tinyspan_model
    name_zh: 冻结 TinySPAN 模型
    inputs_zh:
      - TinySPAN 最终训练 checkpoint
      - 最终 metrics.csv
      - TinySPAN 模型配置文件
    outputs_zh:
      - 冻结后的 TinySPAN checkpoint 副本
      - SHA256 哈希
      - 最后一行训练指标
    pass_when_zh:
      - checkpoint 已固定用于本次 TinySPAN 验收
      - checkpoint 哈希已记录
      - 最终指标已记录
      - 模型结构、训练配置、数据集来源和训练指标已写入交付文档
      - 没有训练进程继续修改 checkpoint

  - id: quantize_and_reference
    name_zh: TinySPAN 量化与软件定点参考
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - 校准集
      - 目标倍率 X2 或 X4
    outputs_zh:
      - TinySPAN 量化方案
      - TinySPAN 整数或定点软件参考
      - 参考输出图片或帧
    pass_when_zh:
      - 量化方案来自同一个冻结 TinySPAN checkpoint
      - 软件定点参考已生成
      - 参考输出哈希已记录
      - fused/export 不存在边界漂移或其它交接不一致
      - 量化方法、量化指标和性能影响已写入交付文档

  - id: tinyspan_rtl_export
    name_zh: TinySPAN RTL 导出
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - TinySPAN 量化方案
    outputs_zh:
      - TinySPAN RTL 权重和参数内存文件
      - TinySPAN RTL manifest
      - 导出摘要
    pass_when_zh:
      - RTL manifest 存在
      - RTL manifest 记录 checkpoint 哈希
      - RTL manifest 记录量化方案哈希
      - 没有使用旧缓存或仍在变化的 checkpoint
      - 导出结果与 TinySPAN 软件定点参考一致
      - 模型到硬件转换工具的输入、输出和复现命令已记录

  - id: tinyspan_rtl_simulation
    name_zh: TinySPAN RTL 仿真
    inputs_zh:
      - TinySPAN RTL 导出结果
      - TinySPAN 软件定点向量
      - tile 参数
    outputs_zh:
      - 层级仿真日志
      - tile 级仿真日志
      - 输出对比报告
    pass_when_zh:
      - TinySPAN RTL tile 输出与 TinySPAN 软件定点参考逐字节一致
      - 有效输出中没有未解析的 X 或 Z
      - Vivado 仿真脚本、测试向量和仿真结果已归档

  - id: tinyspan_implementation
    name_zh: TinySPAN 实现与资源约束
    preferred_direction:
      model: c32b4
      first_scale: x4
      x4_input_resolution: [320, 180]
      x4_output_resolution: [1280, 720]
      board: xczu19eg-ffvc1760-2-i
      resource_gate: xc7z045_zc706
    pass_when_zh:
      - 已为实际板卡生成 TinySPAN bitstream
      - 时序通过
      - XC7Z045 / ZC706 资源门限通过
      - Vivado 正常退出
      - 没有残留 Vivado helper 进程
      - utilization、timing、power 和 PPA 汇总已归档

  - id: tinyspan_board_smoke
    name_zh: TinySPAN 板卡冒烟测试
    inputs_zh:
      - 已通过实现阶段的 TinySPAN bitstream
      - SD 或 DDR 格式的完整输入帧
      - PS/PL 运行脚本
    pass_when_zh:
      - JTAG target 数量大于 0
      - TinySPAN bitstream 下载成功
      - PS 完成 DDR buffer 初始化
      - PL 完成硬件切块 TinySPAN 推理
      - TinySPAN 板上输出可回读
    stop_when_zh:
      - JTAG target 数量为 0 时停止跑板流程，先检查板卡连接、驱动、模式和工具占用。

  - id: tinyspan_image_consistency
    name_zh: TinySPAN 图像一致性可视化验证
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - 同一完整输入帧
      - TinySPAN 训练或浮点推理超分输出
      - TinySPAN 软件定点参考输出
      - TinySPAN 板上输出
    outputs_zh:
      - training_sr.png
      - software_fixed_point_sr.png
      - board_sr.png
      - diff_heatmap.png
      - comparison_preview.png
      - image_validation.json
      - image_validation.md
    pass_when_zh:
      - board_sr 与 software_fixed_point_sr 对应的原始 RGB 数据逐字节一致
      - board_sr 与 training_sr 的 PSNR、SSIM、MAE、最大通道差值已记录
      - 默认视觉一致性门限通过，或 image_validation.md 明确解释差异且最终验收不宣告完成
      - comparison_preview.png 可查看
      - diff_heatmap.png 可查看

  - id: tinyspan_final_acceptance
    name_zh: TinySPAN 最终 720p30 验收
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - TinySPAN 量化方案
      - 同一完整输入帧
      - 同一个 TinySPAN bitstream
      - TinySPAN 板上输出
    pass_when_zh:
      - 板上输出分辨率为 1280x720
      - 板上输出 SHA256 等于 TinySPAN 软件定点参考 SHA256
      - TinySPAN 图像一致性可视化验证通过
      - 实测吞吐大于等于 30fps
      - 资源门限通过
      - 证据包已上传到 Tinyspan/artifacts
