contest_requirements:
  title_zh: 端侧 AI 超分硬件加速器赛题要求
  goal_zh: 面向端侧视频会议场景，设计专用 AI 超分硬件加速器，在清晰度、实时性、功耗/面积之间取得平衡。
  model_constraints_zh:
    - AI 模型、量化、稀疏化方法不做限制。
    - 图像输入格式不限，可使用 RGB 或 YUV。
    - AI 模型可参考 CVPR NTIRE 相关论文。
  scenario_zh:
    - 适配视频会议核心画面特征，包括人像、文档、屏幕共享等。
    - 实现实时、高保真的超分辨率输出。
    - 在实际视频会议场景下验证画质与性能表现。
  platform_zh:
    board_target: Xilinx ZC706 或资源相当 FPGA
    current_board: xczu19eg-ffvc1760-2-i
    resource_gate: XC7Z045 / ZC706 等效资源门限
  dataset:
    name: REDS
    url: https://seungjunnah.github.io/Datasets/reds.html
    paper: 'S. Nah et al., "NTIRE 2019 Challenge on Video Deblurring and Super-Resolution: Dataset and Study"'
  required_scales:
    - x2
    - x4
  deliverables_zh:
    - AI 模型结构说明文档及源代码。
    - 训练说明文档及源代码。
    - 量化说明文档及源代码。
    - 稀疏化方法如有使用，需提供说明与可复现实验记录。
    - 模型到硬件加速器指令、权重、参数或 RTL memory 的转换工具。
    - 硬件加速器详细设计文档。
    - 硬件加速器源代码。
    - Vivado 仿真验证脚本、测试向量和结果。
    - Vivado 综合/实现脚本，以及用于资源开销评估的报告。
  review_points:
    - item_zh: 功能实现精准无误，与题目要求高度契合
      score: 10
      evidence_zh: X2/X4 正确性、TinySPAN 软件定点参考与硬件输出一致、视频会议样例验证。
    - item_zh: 设计方案文档表述清晰，模块功能划分科学合理
      score: 10
      evidence_zh: 模型文档、硬件模块设计文档、数据流和接口说明。
    - item_zh: 文档明确阐释模块内部量化指标及相应性能分析
      score: 20
      evidence_zh: 量化方案、PSNR/SSIM/MAE、吞吐、延迟、资源、功耗/面积分析。
    - item_zh: 具备完善的验证方案与验证用例
      score: 20
      evidence_zh: REDS 验证集、会议场景样例、RTL 仿真、板上输出、图像一致性预览。
    - item_zh: 同等性能约束下面积越小、功耗越低越好
      score: 40
      evidence_zh: Vivado utilization、timing、power、资源门限、bitstream 与 PPA 汇总。
  hard_rules_zh:
    - 如果未通过正确性仿真验证以及未生成 bitstream，PPA 项不得作为有效得分证据。
    - 每个 TinySPAN 验收 run 必须记录数据集/输入来源、降采样方式、哈希和验证指标。
    - X2 和 X4 必须分别保留证据包。
    - 图像一致性验证必须产出 comparison_preview.png 和 diff_heatmap.png。

route_lock:
  main_route: TinySPAN
  description_zh: 本工作流主线锁定为 TinySPAN，不以 W8A12 作为验收路线。
  accepted_model_family:
    - TinySPAN
  reference_only_routes:
    - W8A12 DDR tile writer
    - full SPAN JTAG smoke
    - ZC706/PS7 board switch
    - PC-side pre-cut tile inference
    - one-shot full-frame TinySPAN core for SD-card frame
  route_rule_zh: 参考路线的结果不能替代 TinySPAN checkpoint、TinySPAN 量化方案、TinySPAN bitstream 和 TinySPAN 板上输出。

board_side_tiling:
  mode: board_side_tiling
  frame_source_zh: SD 卡或 DDR 中保存完整 LR 图像/视频帧，最终验收不把 PC 端预切 tile 作为板卡输入。
  acceptance_tile_lr: [32, 32]
  candidate_tile_lr: [64, 64]
  route_decision_date: 2026-06-21
  final_x4_frame_lr: [320, 180]
  final_x4_frame_sr: [1280, 720]
  smoke_frame_lr: [160, 90]
  smoke_frame_sr: [640, 360]
  smoke_frame_rule_zh: 160x90 只作为完整帧切块调度 smoke，不能替代最终 320x180 到 1280x720 验收。
  tile_priority_zh: 当前 32x32 LR tile 是上板验收目标；64x64 LR tile 仅作为资源、BRAM 和时序允许时的备选加速路线。
  x4_tile_output_sr:
    tile_32x32: [128, 128]
    tile_64x64: [256, 256]
  x2_tile_output_sr:
    tile_32x32: [64, 64]
    tile_64x64: [128, 128]
  scheduler_responsibilities_zh:
    - tile 坐标生成
    - DDR/SD 输入帧 tile 与 halo 读取
    - 边界处理
    - TinySPAN 推理启动与完成握手
    - SR tile 有效区域裁剪
    - 输出地址映射
    - 1280x720 输出帧写回 DDR
  forbidden_as_final_zh:
    - PC 端预切小块后直接送板卡逐块推理
    - 一次性整帧 TinySPAN 核直接处理完整 LR 帧并替代板端切块拼接方案

