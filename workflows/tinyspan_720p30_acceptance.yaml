    software_fixed_point_sr: software_fixed_point_sr.png
    software_tiled_fixed_point_sr: software_tiled_fixed_point_sr.png
    board_sr: board_sr.png
    diff_heatmap: diff_heatmap.png
    comparison_preview: comparison_preview.png
  required_reports:
    json: image_validation.json
    markdown: image_validation.md
  hard_gate_zh:
    - board_sr 对应的原始 RGB 数据必须与 software_fixed_point_sr 逐字节一致。
    - 完整帧板端切块路线的 software_fixed_point_sr 必须来自 hardware-tiled fixed-point reference，不得用一次性整帧软件输出替代。
    - comparison_preview.png 必须可直接打开查看。
    - diff_heatmap.png 必须可直接打开查看。
  visual_metric_defaults:
    compare_pair: board_sr_vs_training_sr
    psnr_db_min: 45.0
    ssim_min: 0.99
    mae_rgb_level_max: 1.0
    max_channel_diff_max: 4
  quality_metric_entry_zh:
    script: tools/image_validation/evaluate_sr_quality.py
    x4_current_report: artifacts/20260618_x4_tinyspan_c32b4_baseline_30fps_safe/x4_quality_metrics_20260625/tinyspan_x4_quality_metrics.json
    required_pairs:
      - student_vs_teacher
      - pytorch_vs_tiled_fixed
      - full_integer_vs_tiled_fixed
    note_zh: student_vs_teacher 是官方 SPAN teacher 一致性指标；REDS HR 真值指标需使用 REDS HR 图作为 reference 另行生成。

workflow:
  - id: baseline_preflight
    name_zh: TinySPAN 硬件安全基线预检
    inputs_zh:
      - c32b4_30fps_frozen_20260613 frozen checkpoint
      - freeze_manifest.json
      - X4 30fps 软件实时验收 summary.json
      - TinySPAN W8A8 量化计划
      - TinySPAN 整数参考摘要
      - TinySPAN RTL manifest
    outputs_zh:
      - baseline_decision.md
      - baseline_manifest.json
      - handoff_readiness.json
      - handoff_readiness.md
    pass_when_zh:
      - checkpoint SHA256 固定为 6A3AA4FE17CDF1027483F95BE8A99A5805BCDD61CC821074603DE65BF333D938
      - quant plan 的 source_checkpoint 指向同一 frozen checkpoint
      - 软件 X4 320x180 到 1280x720 30fps 验收通过
      - 整数参考和 RTL manifest 均来自同一 checkpoint 与同一量化计划
      - readiness 明确列出尚未完成的 bitstream 与真实板上输出，避免误宣告完成

  - id: freeze_tinyspan_model
    name_zh: 冻结 TinySPAN 模型
    inputs_zh:
      - TinySPAN 最终训练 checkpoint
      - 最终 metrics.csv
      - TinySPAN 模型配置文件
    outputs_zh:
      - 冻结后的 TinySPAN checkpoint 副本
      - SHA256 哈希
      - 最后一行训练指标
    pass_when_zh:
      - checkpoint 已固定用于本次 TinySPAN 验收
      - checkpoint 哈希已记录
      - 最终指标已记录
      - 模型结构、训练配置、数据集来源和训练指标已写入交付文档
      - 没有训练进程继续修改 checkpoint

  - id: quantize_and_reference
    name_zh: TinySPAN 量化与软件定点参考
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - 校准集
      - 目标倍率 X2 或 X4
    outputs_zh:
      - TinySPAN 量化方案
      - TinySPAN 整数或定点软件参考
      - TinySPAN hardware-tiled full-frame fixed reference
      - 参考输出图片或帧
    pass_when_zh:
      - 量化方案来自同一个冻结 TinySPAN checkpoint
      - 软件定点参考已生成
      - 完整帧板端切块路线已生成 software_tiled_fixed_point_sr.png 和 tile_manifest.json
      - 参考输出哈希已记录
      - fused/export 不存在边界漂移或其它交接不一致
      - 量化方法、量化指标和性能影响已写入交付文档

  - id: tinyspan_rtl_export
    name_zh: TinySPAN RTL 导出
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - TinySPAN 量化方案
    outputs_zh:
      - TinySPAN RTL 权重和参数内存文件
      - TinySPAN RTL manifest
      - 导出摘要
    pass_when_zh:
      - RTL manifest 存在
      - RTL manifest 记录 checkpoint 哈希
      - RTL manifest 记录量化方案哈希
      - 没有使用旧缓存或仍在变化的 checkpoint
      - 导出结果与 TinySPAN 软件定点参考一致
      - 模型到硬件转换工具的输入、输出和复现命令已记录

  - id: tinyspan_rtl_simulation
    name_zh: TinySPAN RTL 仿真
    inputs_zh:
      - TinySPAN RTL 导出结果
      - TinySPAN 软件定点向量
      - tile 参数
    outputs_zh:
      - 层级仿真日志
      - tile 级仿真日志
      - 输出对比报告
    pass_when_zh:
      - TinySPAN RTL tile 输出与 TinySPAN 软件定点参考逐字节一致
      - 有效输出中没有未解析的 X 或 Z
      - Vivado 仿真脚本、测试向量和仿真结果已归档

  - id: tinyspan_implementation
    name_zh: TinySPAN 实现与资源约束
    preferred_direction:
      model: c32b4
      first_scale: x4
      x4_input_resolution: [320, 180]
      x4_output_resolution: [1280, 720]
      x4_fast_base_target: 8 镜像 BRAM、两行 tap/周期
      x4_candidate_pl_freq_mhz: 150
      board: xczu19eg-ffvc1760-2-i
      resource_gate: xc7z045_zc706
    pass_when_zh:
      - 已为实际板卡生成 TinySPAN bitstream
      - 时序通过
      - XC7Z045 / ZC706 资源门限通过
      - Vivado 正常退出
      - 没有残留 Vivado helper 进程
      - utilization、timing、power 和 PPA 汇总已归档

  - id: tinyspan_board_smoke
    name_zh: TinySPAN 板卡冒烟测试
    inputs_zh:
      - 已通过实现阶段的 TinySPAN bitstream
      - SD 或 DDR 格式的完整输入帧
      - PS/PL 运行脚本
    pass_when_zh:
      - JTAG target 数量大于 0
      - TinySPAN bitstream 下载成功
      - PS 完成 DDR buffer 初始化
      - PL 完成硬件切块 TinySPAN 推理
      - TinySPAN 板上输出可回读
      - 板上输出对应同一完整输入帧和同一套 board-side tile 调度参数
    stop_when_zh:
      - JTAG target 数量为 0 时停止跑板流程，先检查板卡连接、驱动、模式和工具占用。

  - id: tinyspan_image_consistency
    name_zh: TinySPAN 图像一致性可视化验证
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - 同一完整输入帧和同一套 board-side tile 调度参数
      - TinySPAN 训练或浮点推理超分输出
      - TinySPAN 软件定点参考输出
      - TinySPAN 板上输出
    outputs_zh:
      - training_sr.png
      - software_fixed_point_sr.png
      - software_tiled_fixed_point_sr.png
      - board_sr.png
      - diff_heatmap.png
      - comparison_preview.png
      - tile_manifest.json
      - image_validation.json
      - image_validation.md
    pass_when_zh:
      - board_sr 与 software_fixed_point_sr 对应的原始 RGB 数据逐字节一致
      - board_sr 与 training_sr 的 PSNR、SSIM、MAE、最大通道差值已记录
      - 默认视觉一致性门限通过，或 image_validation.md 明确解释差异且最终验收不宣告完成
      - comparison_preview.png 可查看
      - diff_heatmap.png 可查看

  - id: tinyspan_final_acceptance
    name_zh: TinySPAN 最终 720p30 验收
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - TinySPAN 量化方案
      - 同一完整输入帧和同一套 board-side tile 调度参数
      - 同一个 TinySPAN bitstream
      - TinySPAN 板上输出
    pass_when_zh:
      - 板上输出分辨率为 1280x720
      - 板上输出 SHA256 等于 TinySPAN 软件定点参考 SHA256
      - 软件定点参考是同一 checkpoint、同一 quant plan 和同一 tile contract 生成的 hardware-tiled reference
      - TinySPAN 图像一致性可视化验证通过
      - 实测吞吐大于等于 30fps
      - 资源门限通过
      - 证据包已上传到 Tinyspan/artifacts

  - id: contest_delivery_package_check
    name_zh: 赛题最终交付包只读校验
    inputs_zh:
      - contest_completion_status.json
      - contest_delivery_audit.json
      - contest_delivery_index.json
      - X2/X4 Gate H manifest
      - 图像验证材料
      - README、WORKFLOW、模型、训练、量化、硬件、验证和 PPA 文档
    command: python .\scripts\acceptance\check_contest_delivery_package.py --repo-root . --artifact-dir artifacts\20260618_x4_tinyspan_c32b4_baseline_30fps_safe
    safe_during_training_zh: 使用 --allow-incomplete 只生成 NOT_COMPLETE 报告；不启动 Vivado、JTAG、XSCT、板卡或训练流程。
    pass_when_zh:
      - 不带 --allow-incomplete 运行时退出码为 0
      - docs、source_tree、status_artifacts、x4_gate_h、x4_images、x2_training_freeze、x2_gate_h 和 final_audit 全部 PASS
      - X2 与 X4 都具备独立冻结、量化、RTL、bitstream、真实板上输出、board-vs-fixed 一致性和 >=30fps 证据
      - contest_delivery_audit accepted=true
