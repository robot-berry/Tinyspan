name: tinyspan_720p30_acceptance
name_zh: TinySPAN 720p30 X2/X4 上板验收
version: 5
updated: 2026-06-18

project_paths:
  description_zh: 当前工程与 TinySPAN 工作流文件的固定存放位置。
  workspace_root: 'G:\UESTC\feitengspan1'
  tinyspan_repo: 'G:\UESTC\feitengspan1\Tinyspan'
  artifact_root: 'G:\UESTC\feitengspan1\Tinyspan\artifacts'
  rule_zh: 后续 TinySPAN 上板验收相关 workflow、记录、哈希、图片验证和可上传证据优先放入 tinyspan_repo 及 artifact_root。

contest_requirements:
  title_zh: 端侧 AI 超分硬件加速器赛题要求
  goal_zh: 面向端侧视频会议场景，设计专用 AI 超分硬件加速器，在清晰度、实时性、功耗/面积之间取得平衡。
  model_constraints_zh:
    - AI 模型、量化、稀疏化方法不做限制。
    - 图像输入格式不限，可使用 RGB 或 YUV。
    - AI 模型可参考 CVPR NTIRE 相关论文。
  scenario_zh:
    - 适配视频会议核心画面特征，包括人像、文档、屏幕共享等。
    - 实现实时、高保真的超分辨率输出。
    - 在实际视频会议场景下验证画质与性能表现。
  platform_zh:
    board_target: Xilinx ZC706 或资源相当 FPGA
    current_board: xczu19eg-ffvc1760-2-i
    resource_gate: XC7Z045 / ZC706 等效资源门限
  dataset:
    name: REDS
    url: https://seungjunnah.github.io/Datasets/reds.html
    paper: 'S. Nah et al., "NTIRE 2019 Challenge on Video Deblurring and Super-Resolution: Dataset and Study"'
  required_scales:
    - x2
    - x4
  deliverables_zh:
    - AI 模型结构说明文档及源代码。
    - 训练说明文档及源代码。
    - 量化说明文档及源代码。
    - 稀疏化方法如有使用，需提供说明与可复现实验记录。
    - 模型到硬件加速器指令、权重、参数或 RTL memory 的转换工具。
    - 硬件加速器详细设计文档。
    - 硬件加速器源代码。
    - Vivado 仿真验证脚本、测试向量和结果。
    - Vivado 综合/实现脚本，以及用于资源开销评估的报告。
  review_points:
    - item_zh: 功能实现精准无误，与题目要求高度契合
      score: 10
      evidence_zh: X2/X4 正确性、TinySPAN 软件定点参考与硬件输出一致、视频会议样例验证。
    - item_zh: 设计方案文档表述清晰，模块功能划分科学合理
      score: 10
      evidence_zh: 模型文档、硬件模块设计文档、数据流和接口说明。
    - item_zh: 文档明确阐释模块内部量化指标及相应性能分析
      score: 20
      evidence_zh: 量化方案、PSNR/SSIM/MAE、吞吐、延迟、资源、功耗/面积分析。
    - item_zh: 具备完善的验证方案与验证用例
      score: 20
      evidence_zh: REDS 验证集、会议场景样例、RTL 仿真、板上输出、图像一致性预览。
    - item_zh: 同等性能约束下面积越小、功耗越低越好
      score: 40
      evidence_zh: Vivado utilization、timing、power、资源门限、bitstream 与 PPA 汇总。
  hard_rules_zh:
    - 如果未通过正确性仿真验证以及未生成 bitstream，PPA 项不得作为有效得分证据。
    - 每个 TinySPAN 验收 run 必须记录数据集/输入来源、降采样方式、哈希和验证指标。
    - X2 和 X4 必须分别保留证据包。
    - 图像一致性验证必须产出 comparison_preview.png 和 diff_heatmap.png。

route_lock:
  main_route: TinySPAN
  description_zh: 本工作流主线锁定为 TinySPAN，不以 W8A12 作为验收路线。
  accepted_model_family:
    - TinySPAN
  reference_only_routes:
    - W8A12 DDR tile writer
    - full SPAN JTAG smoke
    - ZC706/PS7 board switch
    - PC-side pre-cut tile inference
  route_rule_zh: 参考路线的结果不能替代 TinySPAN checkpoint、TinySPAN 量化方案、TinySPAN bitstream 和 TinySPAN 板上输出。

target:
  description_zh: 实际运行在 xczu19eg 原板卡上，资源按 ZC706 / XC7Z045 规模约束。
  board_actual: xczu19eg-ffvc1760-2-i
  resource_gate: xc7z045_zc706
  output_resolution: [1280, 720]
  minimum_fps: 30
  accepted_scales: [2, 4]

frame_contracts:
  x2:
    description_zh: X2 模式由 640x360 输入超分到 1280x720 输出。
    input_resolution: [640, 360]
    output_resolution: [1280, 720]
  x4:
    description_zh: X4 模式由 320x180 输入超分到 1280x720 输出。
    input_resolution: [320, 180]
    output_resolution: [1280, 720]

resource_limits:
  description_zh: 任一资源实际值超过对应上限即判定资源门限失败。
  dsp: 900
  bram_tile: 545
  uram: 0
  io: 362
  slice_lut: 218600
  slice_register: 437200

artifact_root: 'G:\UESTC\feitengspan1\Tinyspan\artifacts'
artifact_root_zh: 后续 TinySPAN 工程生成的验收材料统一放到上述 artifacts 目录。

run_directory_pattern: "{date}_{scale}_tinyspan_{model}_{tile}_{freq}_{tag}"
run_directory_pattern_zh: 每次运行使用一个独立目录，例如 20260618_x4_tinyspan_c32b4_tile32_h21_f50_origboard。

current_status_zh:
  date: 2026-06-18
  training: TinySPAN 训练已完成。
  software_best: c32b4_final_20260615 软件质量更好，已通过 320x180 到 1280x720 的 30fps 软件验收。
  board_safe_candidate: c32b4_30fps_frozen_20260613 目前是已证明 fused manifest 与软件输出逐字节一致的 TinySPAN 硬件安全候选。
  blocker: c32b4_final_20260615 fused/export 存在边界漂移，修复前不能直接上板验收。
  stopped_route: W8A12 wf18d/wf18e Vivado 已停止；其结果不作为 TinySPAN 验收证据。

