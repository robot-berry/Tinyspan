name: tinyspan_720p30_acceptance
name_zh: TinySPAN 720p30 X2/X4 上板验收
version: 2
updated: 2026-06-18

route_lock:
  main_route: TinySPAN
  description_zh: 本工作流主线锁定为 TinySPAN，不以 W8A12 作为验收路线。
  accepted_model_family:
    - TinySPAN
  reference_only_routes:
    - W8A12 DDR tile writer
    - full SPAN JTAG smoke
    - ZC706/PS7 board switch
    - PC-side pre-cut tile inference
  route_rule_zh: 参考路线的结果不能替代 TinySPAN checkpoint、TinySPAN 量化方案、TinySPAN bitstream 和 TinySPAN 板上输出。

target:
  description_zh: 实际运行在 xczu19eg 原板卡上，资源按 ZC706 / XC7Z045 规模约束。
  board_actual: xczu19eg-ffvc1760-2-i
  resource_gate: xc7z045_zc706
  output_resolution: [1280, 720]
  minimum_fps: 30
  accepted_scales: [2, 4]

frame_contracts:
  x2:
    description_zh: X2 模式由 640x360 输入超分到 1280x720 输出。
    input_resolution: [640, 360]
    output_resolution: [1280, 720]
  x4:
    description_zh: X4 模式由 320x180 输入超分到 1280x720 输出。
    input_resolution: [320, 180]
    output_resolution: [1280, 720]

resource_limits:
  description_zh: 任一资源实际值超过对应上限即判定资源门限失败。
  dsp: 900
  bram_tile: 545
  uram: 0
  io: 362
  slice_lut: 218600
  slice_register: 437200

artifact_root: 'G:\UESTC\feitengspan1\Tinyspan\artifacts'
artifact_root_zh: 后续 TinySPAN 工程生成的验收材料统一放到上述 artifacts 目录。

run_directory_pattern: "{date}_{scale}_tinyspan_{model}_{tile}_{freq}_{tag}"
run_directory_pattern_zh: 每次运行使用一个独立目录，例如 20260618_x4_tinyspan_c32b4_tile32_h21_f50_origboard。

current_status_zh:
  date: 2026-06-18
  training: TinySPAN 训练已完成。
  software_best: c32b4_final_20260615 软件质量更好，已通过 320x180 到 1280x720 的 30fps 软件验收。
  board_safe_candidate: c32b4_30fps_frozen_20260613 目前是已证明 fused manifest 与软件输出逐字节一致的 TinySPAN 硬件安全候选。
  blocker: c32b4_final_20260615 fused/export 存在边界漂移，修复前不能直接上板验收。
  stopped_route: W8A12 wf18d Vivado 已停止；其结果不作为 TinySPAN 验收证据。

required_artifacts:
  - manifest.json
  - run_summary.md
  - checkpoint.sha256
  - quant_plan.sha256
  - input.sha256
  - software_reference.sha256
  - board_output.sha256
  - resource_gate.json
  - utilization.rpt
  - timing.rpt
  - board.log
  - throughput.json

workflow:
  - id: freeze_tinyspan_model
    name_zh: 冻结 TinySPAN 模型
    inputs_zh:
      - TinySPAN 最终训练 checkpoint
      - 最终 metrics.csv
      - TinySPAN 模型配置文件
    outputs_zh:
      - 冻结后的 TinySPAN checkpoint 副本
      - SHA256 哈希
      - 最后一行训练指标
    pass_when_zh:
      - checkpoint 已固定用于本次 TinySPAN 验收
      - checkpoint 哈希已记录
      - 最终指标已记录
      - 没有训练进程继续修改 checkpoint

  - id: quantize_and_reference
    name_zh: TinySPAN 量化与软件定点参考
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - 校准集
      - 目标倍率 X2 或 X4
    outputs_zh:
      - TinySPAN 量化方案
      - TinySPAN 整数或定点软件参考
      - 参考输出图片或帧
    pass_when_zh:
      - 量化方案来自同一个冻结 TinySPAN checkpoint
      - 软件定点参考已生成
      - 参考输出哈希已记录
      - fused/export 不存在边界漂移或其它交接不一致

  - id: tinyspan_rtl_export
    name_zh: TinySPAN RTL 导出
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - TinySPAN 量化方案
    outputs_zh:
      - TinySPAN RTL 权重和参数内存文件
      - TinySPAN RTL manifest
      - 导出摘要
    pass_when_zh:
      - RTL manifest 存在
      - RTL manifest 记录 checkpoint 哈希
      - RTL manifest 记录量化方案哈希
      - 没有使用旧缓存或仍在变化的 checkpoint
      - 导出结果与 TinySPAN 软件定点参考一致

  - id: tinyspan_rtl_simulation
    name_zh: TinySPAN RTL 仿真
    inputs_zh:
      - TinySPAN RTL 导出结果
      - TinySPAN 软件定点向量
      - tile 参数
    outputs_zh:
      - 层级仿真日志
      - tile 级仿真日志
      - 输出对比报告
    pass_when_zh:
      - TinySPAN RTL tile 输出与 TinySPAN 软件定点参考逐字节一致
      - 有效输出中没有未解析的 X 或 Z

  - id: tinyspan_implementation
    name_zh: TinySPAN 实现与资源约束
    preferred_direction:
      model: c32b4
      first_scale: x4
      x4_input_resolution: [320, 180]
      x4_output_resolution: [1280, 720]
      board: xczu19eg-ffvc1760-2-i
      resource_gate: xc7z045_zc706
    pass_when_zh:
      - 已为实际板卡生成 TinySPAN bitstream
      - 时序通过
      - XC7Z045 / ZC706 资源门限通过
      - Vivado 正常退出
      - 没有残留 Vivado helper 进程

  - id: tinyspan_board_smoke
    name_zh: TinySPAN 板卡冒烟测试
    inputs_zh:
      - 已通过实现阶段的 TinySPAN bitstream
      - SD 或 DDR 格式的完整输入帧
      - PS/PL 运行脚本
    pass_when_zh:
      - JTAG target 数量大于 0
      - TinySPAN bitstream 下载成功
      - PS 完成 DDR buffer 初始化
      - PL 完成硬件切块 TinySPAN 推理
      - TinySPAN 板上输出可回读
    stop_when_zh:
      - JTAG target 数量为 0 时停止跑板流程，先检查板卡连接、驱动、模式和工具占用。

  - id: tinyspan_final_acceptance
    name_zh: TinySPAN 最终 720p30 验收
    inputs_zh:
      - 冻结 TinySPAN checkpoint
      - TinySPAN 量化方案
      - 同一完整输入帧
      - 同一个 TinySPAN bitstream
      - TinySPAN 板上输出
    pass_when_zh:
      - 板上输出分辨率为 1280x720
      - 板上输出 SHA256 等于 TinySPAN 软件定点参考 SHA256
      - 实测吞吐大于等于 30fps
      - 资源门限通过
      - 证据包已上传到 Tinyspan/artifacts
